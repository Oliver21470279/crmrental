<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rental CRM - Nueva Renta</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<aside class="sidebar">
    <div class="sidebar-header">
        <span class="logo-icon">
            <img src="src/logo.svg" alt="">
            <p></p>
        </span>
    </div>

    <div class="sidebar-menu">
        <button class="menu-btn">
            <span class="menu-btn-content">
                <svg class="menu-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zm10 0a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zm10 0a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"></path></svg>
                Dashboards
            </span>
            <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 15l7-7 7 7"></path></svg>
        </button>
        <div class="sub-menu">
            <a href="index.html">Inicio</a>
            <a href="#">Inventario</a>
            <a href="#">Contratos</a>
            <a href="#">Clientes</a>
        </div>

        <button class="menu-btn transparent" style="margin-top: 16px;">
            <div class="menu-btn-content">
                <svg class="menu-icon gray" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                Ajustes
            </div>
        </button>
    </div>
</aside>

<main class="main-content">
    <div class="header-bg"></div>

    <nav class="top-navbar">
        <div>
            <div class="breadcrumb">Pages / Nueva Renta</div>
            <h1 class="page-title">Nueva Renta</h1>
        </div>
        <div class="nav-actions">
            <button class="nav-btn">
                <svg width="16" height="16" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z" clip-rule="evenodd"></path></svg>
                Acceder
            </button>
            <button class="nav-btn"><svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c..."></path></svg></button>
            <button class="nav-btn"><svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"></path></svg></button>
        </div>
    </nav>

    <div class="form-container">
        <h2>Nueva Renta</h2>

        <form action="#">
            <div class="form-grid">
                <div class="form-group">
                    <label>Estado</label>
                    <select class="form-control">
                        <option>Activo</option>
                        <option>Inactivo</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Cliente</label>
                    <input type="text" class="form-control" placeholder="Nombre">
                </div>
                <div class="form-group">
                    <label>Monto</label>
                    <input type="text" class="form-control" placeholder="MXN$">
                </div>
            </div>

            <div class="form-grid" style="grid-template-columns: repeat(2, 1fr); max-width: 66%;">
                <div class="form-group">
                    <label>Fecha de inicio</label>
                    <input type="date" class="form-control">
                </div>
                <div class="form-group">
                    <label>Fecha de término</label>
                    <input type="date" class="form-control">
                </div>
            </div>

            <div class="products-section">
                <div class="products-header">
                    <label style="font-size: 12px; font-weight: bold; color: var(--slate-700); text-transform: uppercase;">Productos</label>
                    <div class="search-box">
                        <svg class="search-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                        <input type="text" class="form-control search-input" placeholder="Buscar producto...">
                    </div>
                </div>
                <div class="empty-area">
                    Área de productos seleccionados
                </div>
            </div>

            <div class="form-actions">
                <button type="button" class="btn btn-cancel">Cancelar</button>
                <button type="submit" class="btn btn-create">Crear</button>
            </div>
        </form>
    </div>

    <footer class="footer">

    </footer>
</main>

</body>
</html>
